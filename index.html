<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음성 녹음기 + 실시간 번역</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .container {
    background: white;
    border-radius: 24px;
    padding: 40px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 600px;
  }
  
  h1 {
    text-align: center;
    color: #2d3748;
    font-size: 28px;
    margin-bottom: 8px;
  }
  
  .subtitle {
    text-align: center;
    color: #718096;
    font-size: 14px;
    margin-bottom: 24px;
  }
  
  .primary-lang-selector {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  
  .selector-label {
    font-size: 12px;
    color: #718096;
    font-weight: 500;
  }
  
  .lang-btn {
    padding: 6px 14px;
    border: 2px solid #e2e8f0;
    background: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    color: #4a5568;
    transition: all 0.2s ease;
  }
  
  .lang-btn:hover { border-color: #667eea; }
  
  .lang-btn.active {
    background: #667eea;
    border-color: #667eea;
    color: white;
  }
  
  .recorder-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }
  
  .record-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    position: relative;
  }
  
  .record-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
  }
  
  .record-btn:active { transform: scale(0.95); }
  
  .record-btn.recording {
    background: linear-gradient(135deg, #1a202c 0%, #000000 100%);
    animation: pulse 1.5s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.7); }
    50% { box-shadow: 0 0 0 20px rgba(0, 0, 0, 0); }
  }
  
  .mic-icon { width: 50px; height: 50px; fill: white; }
  
  .stop-icon {
    width: 40px; height: 40px;
    background: white; border-radius: 8px;
    display: none;
  }
  
  .recording .mic-icon { display: none; }
  .recording .stop-icon { display: block; }
  
  .timer {
    margin-top: 20px;
    font-size: 32px;
    font-weight: 300;
    color: #2d3748;
    font-variant-numeric: tabular-nums;
  }
  
  .status {
    margin-top: 8px;
    color: #718096;
    font-size: 14px;
    min-height: 20px;
  }
  
  .waveform {
    width: 100%;
    height: 60px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  
  .wave-bar {
    width: 4px;
    background: linear-gradient(180deg, #667eea, #764ba2);
    border-radius: 2px;
    transition: height 0.1s ease;
    height: 4px;
  }
  
  .live-transcripts {
    width: 100%;
    margin-top: 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
  }
  
  .live-transcripts.show { display: flex; }
  
  .live-box {
    background: #f7fafc;
    border-radius: 12px;
    padding: 14px;
    min-height: 60px;
    font-size: 14px;
    line-height: 1.6;
    color: #2d3748;
    border-left: 4px solid;
  }
  
  .live-box.korean { border-left-color: #48bb78; }
  .live-box.english { border-left-color: #4299e1; }
  
  .live-box-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .live-box.korean .live-box-label { color: #48bb78; }
  .live-box.english .live-box-label { color: #4299e1; }
  
  .translating-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: currentColor;
    animation: blink 1s infinite;
    display: none;
  }
  
  .translating .translating-indicator { display: inline-block; }
  
  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  
  .interim { color: #a0aec0; font-style: italic; }
  
  .live-empty {
    color: #cbd5e0;
    font-size: 13px;
    font-style: italic;
  }
  
  .recordings-list { margin-top: 20px; }
  
  .recordings-title {
    font-size: 16px;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .recording-count {
    background: #667eea;
    color: white;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  
  .recording-item {
    background: #f7fafc;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  
  .recording-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .recording-info { flex: 1; min-width: 0; }
  
  .recording-name {
    font-size: 14px;
    font-weight: 500;
    color: #2d3748;
    margin-bottom: 4px;
  }
  
  .recording-duration { font-size: 12px; color: #718096; }
  
  .recording-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .action-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    color: #4a5568;
  }
  
  .action-btn:hover {
    background: #667eea;
    color: white;
    transform: translateY(-2px);
  }
  
  .action-btn.text:hover { background: #48bb78; }
  .action-btn.delete:hover { background: #f5576c; }
  
  .action-btn svg { width: 16px; height: 16px; fill: currentColor; }
  
  .transcript-container {
    margin-top: 12px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  
  .transcript-container.show { display: flex; }
  
  .transcript-box {
    background: white;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.6;
    color: #2d3748;
    border-left: 3px solid;
  }
  
  .transcript-box.korean { border-left-color: #48bb78; }
  .transcript-box.english { border-left-color: #4299e1; }
  
  .transcript-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .transcript-box.korean .transcript-label > span:first-child { color: #48bb78; }
  .transcript-box.english .transcript-label > span:first-child { color: #4299e1; }
  
  .copy-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.2s ease;
    margin-left: 4px;
  }
  
  .transcript-box.korean .copy-btn { color: #48bb78; }
  .transcript-box.korean .copy-btn:hover { background: #48bb78; color: white; }
  .transcript-box.english .copy-btn { color: #4299e1; }
  .transcript-box.english .copy-btn:hover { background: #4299e1; color: white; }
  
  .transcript-empty {
    color: #a0aec0;
    font-style: italic;
    font-size: 12px;
  }
  
  .empty-state {
    text-align: center;
    color: #a0aec0;
    font-size: 13px;
    padding: 20px;
  }
  
  .error-msg {
    background: #fed7d7;
    color: #c53030;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
    display: none;
  }
  
  .error-msg.show { display: block; }
  
  .info-banner {
    background: #ebf4ff;
    color: #2c5282;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    margin-bottom: 16px;
    text-align: center;
    line-height: 1.5;
  }
  
  .debug-panel {
    background: #1a202c;
    color: #cbd5e0;
    border-radius: 8px;
    padding: 12px;
    margin-top: 16px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.5;
    display: none;
  }
  
  .debug-panel.show { display: block; }
  
  .debug-line { padding: 2px 0; }
  .debug-line.info { color: #90cdf4; }
  .debug-line.success { color: #9ae6b4; }
  .debug-line.error { color: #fc8181; }
  .debug-line.warn { color: #fbd38d; }
  
  .debug-toggle {
    background: none;
    border: 1px solid #cbd5e0;
    color: #4a5568;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    margin-top: 8px;
  }
  
  .debug-toggle:hover { background: #f7fafc; }
</style>
</head>
<body>
  <div class="container">
    <h1>🎙️ 음성 녹음 + 실시간 번역</h1>
    <p class="subtitle">말하는 동안 원문과 번역을 동시에 확인</p>
    
    <div class="info-banner" id="infoBanner">
      💡 한국어로 말하면 영어 번역이, 영어로 말하면 한국어 번역이 함께 표시돼요<br>
      <small style="opacity: 0.8">번역: MyMemory Translation API (무료, 일일 사용량 제한 있음)</small>
    </div>
    
    <div class="primary-lang-selector">
      <span class="selector-label">녹음 언어:</span>
      <button class="lang-btn active" data-lang="ko-KR">🇰🇷 한국어</button>
      <button class="lang-btn" data-lang="en-US">🇺🇸 English</button>
    </div>
    
    <div class="recorder-area">
      <button class="record-btn" id="recordBtn">
        <svg class="mic-icon" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
        </svg>
        <div class="stop-icon"></div>
      </button>
      
      <div class="timer" id="timer">00:00</div>
      <div class="status" id="status">탭하여 녹음 시작</div>
      
      <div class="waveform" id="waveform"></div>
      
      <div class="live-transcripts" id="liveTranscripts">
        <div class="live-box" id="liveOriginal">
          <div class="live-box-label">
            <span id="originalLangLabel">🇰🇷 원문 (한국어)</span>
          </div>
          <div id="liveOriginalText"><div class="live-empty">말씀해주세요...</div></div>
        </div>
        <div class="live-box" id="liveTranslation">
          <div class="live-box-label">
            <span id="translationLangLabel">🇺🇸 번역 (영어)</span>
            <span class="translating-indicator"></span>
          </div>
          <div id="liveTranslationText"><div class="live-empty">번역이 여기 표시됩니다...</div></div>
        </div>
      </div>
    </div>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <button class="debug-toggle" id="debugToggle">🔍 디버그 로그 보기</button>
    <div class="debug-panel" id="debugPanel"></div>
    
    <div class="recordings-list">
      <div class="recordings-title">
        녹음 목록 <span class="recording-count" id="count">0</span>
      </div>
      <div id="recordingsList">
        <div class="empty-state">아직 녹음된 파일이 없어요</div>
      </div>
    </div>
  </div>

<script>
  const recordBtn = document.getElementById('recordBtn');
  const timer = document.getElementById('timer');
  const status = document.getElementById('status');
  const waveform = document.getElementById('waveform');
  const recordingsList = document.getElementById('recordingsList');
  const countEl = document.getElementById('count');
  const errorMsg = document.getElementById('errorMsg');
  const liveTranscripts = document.getElementById('liveTranscripts');
  const liveOriginal = document.getElementById('liveOriginal');
  const liveTranslation = document.getElementById('liveTranslation');
  const liveOriginalText = document.getElementById('liveOriginalText');
  const liveTranslationText = document.getElementById('liveTranslationText');
  const originalLangLabel = document.getElementById('originalLangLabel');
  const translationLangLabel = document.getElementById('translationLangLabel');
  const infoBanner = document.getElementById('infoBanner');
  
  let mediaRecorder = null;
  let audioChunks = [];
  let stream = null;
  let audioContext = null;
  let analyser = null;
  let animationId = null;
  let startTime = 0;
  let timerInterval = null;
  let recordings = [];
  let recordingCounter = 0;
  
  let recognition = null;
  let primaryLanguage = 'ko-KR';
  let finalTranscript = '';
  let interimTranscript = '';
  
  // 번역 관련
  let liveTranslation_finalText = '';      // 확정된 원문 누적 (번역 완료된 부분)
  let liveTranslation_translatedText = ''; // 번역된 텍스트 누적
  let translationQueue = [];               // 번역 대기 큐
  let isTranslating = false;
  let pendingOriginalForTranslation = '';  // 번역 대기 중인 새로 확정된 원문
  let translateDebounceTimer = null;
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const speechSupported = !!SpeechRecognition;
  
  // 디버그 패널
  const debugPanel = document.getElementById('debugPanel');
  const debugToggle = document.getElementById('debugToggle');
  
  debugToggle.addEventListener('click', () => {
    debugPanel.classList.toggle('show');
    debugToggle.textContent = debugPanel.classList.contains('show') 
      ? '🔍 디버그 로그 숨기기' 
      : '🔍 디버그 로그 보기';
  });
  
  function debugLog(msg, type = 'info') {
    const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
    const line = document.createElement('div');
    line.className = `debug-line ${type}`;
    const text = typeof msg === 'string' ? msg : JSON.stringify(msg);
    line.textContent = `[${time}] ${text}`;
    debugPanel.appendChild(line);
    debugPanel.scrollTop = debugPanel.scrollHeight;
    
    // 콘솔에도 출력
    if (type === 'error') console.error(msg);
    else if (type === 'warn') console.warn(msg);
    else console.log(msg);
    
    // 로그가 너무 많으면 오래된 것 삭제
    while (debugPanel.children.length > 100) {
      debugPanel.removeChild(debugPanel.firstChild);
    }
  }
  
  if (!speechSupported) {
    infoBanner.innerHTML = '⚠️ 이 브라우저는 음성 인식을 지원하지 않아요. Chrome이나 Edge를 사용해보세요.';
    infoBanner.style.background = '#fef3c7';
    infoBanner.style.color = '#92400e';
  }
  
  function updateLangLabels() {
    if (primaryLanguage === 'ko-KR') {
      originalLangLabel.textContent = '🇰🇷 원문 (한국어)';
      translationLangLabel.textContent = '🇺🇸 번역 (영어)';
      liveOriginal.className = 'live-box korean';
      liveTranslation.className = 'live-box english';
    } else {
      originalLangLabel.textContent = '🇺🇸 원문 (English)';
      translationLangLabel.textContent = '🇰🇷 번역 (한국어)';
      liveOriginal.className = 'live-box english';
      liveTranslation.className = 'live-box korean';
    }
  }
  
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      primaryLanguage = btn.dataset.lang;
      updateLangLabels();
    });
  });
  
  updateLangLabels();
  
  const BAR_COUNT = 40;
  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    waveform.appendChild(bar);
  }
  const waveBars = document.querySelectorAll('.wave-bar');
  
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 4000);
  }
  
  function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }
  
  function updateTimer() {
    const elapsed = (Date.now() - startTime) / 1000;
    timer.textContent = formatTime(elapsed);
  }
  
  function visualize() {
    if (!analyser) return;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);
    const step = Math.floor(bufferLength / BAR_COUNT);
    waveBars.forEach((bar, i) => {
      const value = dataArray[i * step] || 0;
      const height = Math.max(4, (value / 255) * 60);
      bar.style.height = `${height}px`;
    });
    animationId = requestAnimationFrame(visualize);
  }
  
  function resetWaveform() {
    waveBars.forEach(bar => bar.style.height = '4px');
  }
  
  // 무료 번역 API (MyMemory) - API 키 불필요, CORS 허용
  async function translateText(text, fromLang, toLang, retryCount = 0) {
    if (!text || !text.trim()) return '';
    
    // MyMemory는 짧은 언어 코드 사용 (ko, en)
    const langCodeMap = { 'ko-KR': 'ko', 'en-US': 'en' };
    const sourceCode = langCodeMap[fromLang];
    const targetCode = langCodeMap[toLang];
    const langPair = `${sourceCode}|${targetCode}`;
    
    debugLog(`번역 시도 ${retryCount + 1}회: ${sourceCode} → ${targetCode}: "${text}"`, 'info');
    
    try {
      // MyMemory는 GET 요청, 한 번에 500자 제한
      const truncatedText = text.length > 500 ? text.substring(0, 500) : text;
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(truncatedText)}&langpair=${langPair}`;
      
      const response = await fetch(url);
      
      debugLog(`응답 상태: ${response.status}`, response.ok ? 'info' : 'error');
      
      if (!response.ok) {
        if (retryCount < 2) {
          debugLog('1초 후 재시도', 'warn');
          await new Promise(r => setTimeout(r, 1000));
          return translateText(text, fromLang, toLang, retryCount + 1);
        }
        showError(`번역 API 오류 (${response.status})`);
        return '';
      }
      
      const data = await response.json();
      debugLog(`응답: ${JSON.stringify(data).substring(0, 200)}`, 'info');
      
      // MyMemory 응답 형식: { responseData: { translatedText: "..." }, ... }
      let translated = '';
      
      if (data.responseData && data.responseData.translatedText) {
        translated = data.responseData.translatedText;
      } else if (data.matches && data.matches.length > 0) {
        translated = data.matches[0].translation;
      }
      
      translated = translated.trim();
      
      // MyMemory가 가끔 'MYMEMORY WARNING' 같은 메시지를 반환할 때 처리
      if (translated.includes('MYMEMORY WARNING') || translated.includes('PLEASE SELECT TWO DISTINCT LANGUAGES')) {
        debugLog(`API 경고 메시지: ${translated}`, 'warn');
        return '';
      }
      
      if (!translated) {
        debugLog('빈 번역 결과', 'warn');
        if (retryCount < 1) {
          await new Promise(r => setTimeout(r, 500));
          return translateText(text, fromLang, toLang, retryCount + 1);
        }
        return '';
      }
      
      debugLog(`번역 성공: "${translated}"`, 'success');
      return translated;
    } catch (err) {
      debugLog(`예외 발생: ${err.message}`, 'error');
      
      if (retryCount < 2) {
        debugLog('네트워크 오류로 재시도', 'warn');
        await new Promise(r => setTimeout(r, 1000));
        return translateText(text, fromLang, toLang, retryCount + 1);
      }
      
      showError('번역 실패: ' + err.message);
      return '';
    }
  }
  
  // 번역 큐 처리 (확정된 텍스트만 번역, 끊어서 누적 번역)
  async function processTranslationQueue() {
    if (isTranslating) {
      console.log('[번역 큐] 이미 번역 중, 건너뜀');
      return;
    }
    if (!pendingOriginalForTranslation.trim()) {
      console.log('[번역 큐] 대기 텍스트 없음');
      return;
    }
    
    isTranslating = true;
    liveTranslation.classList.add('translating');
    
    const textToTranslate = pendingOriginalForTranslation.trim();
    pendingOriginalForTranslation = '';
    
    const targetLang = primaryLanguage === 'ko-KR' ? 'en-US' : 'ko-KR';
    console.log('[번역 큐 처리]', primaryLanguage, '→', targetLang, ':', textToTranslate);
    
    const translated = await translateText(textToTranslate, primaryLanguage, targetLang);
    
    if (translated) {
      liveTranslation_translatedText += (liveTranslation_translatedText ? ' ' : '') + translated;
      liveTranslation_finalText += (liveTranslation_finalText ? ' ' : '') + textToTranslate;
      renderLiveTranslation();
    } else {
      console.warn('[번역 큐] 빈 번역 결과 - 다시 큐에 추가하지 않음');
    }
    
    liveTranslation.classList.remove('translating');
    isTranslating = false;
    
    // 큐에 더 있으면 계속 처리
    if (pendingOriginalForTranslation.trim()) {
      processTranslationQueue();
    }
  }
  
  function renderLiveTranslation() {
    if (liveTranslation_translatedText) {
      liveTranslationText.innerHTML = escapeHtml(liveTranslation_translatedText);
    } else {
      liveTranslationText.innerHTML = '<div class="live-empty">번역이 여기 표시됩니다...</div>';
    }
  }
  
  function renderLiveOriginal() {
    const display = finalTranscript + interimTranscript;
    if (display.trim()) {
      liveOriginalText.innerHTML = 
        `${escapeHtml(finalTranscript)}<span class="interim">${escapeHtml(interimTranscript)}</span>`;
    } else {
      liveOriginalText.innerHTML = '<div class="live-empty">말씀해주세요...</div>';
    }
  }
  
  function startSpeechRecognition() {
    if (!speechSupported) return;
    
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = primaryLanguage;
    
    finalTranscript = '';
    interimTranscript = '';
    liveTranslation_finalText = '';
    liveTranslation_translatedText = '';
    pendingOriginalForTranslation = '';
    
    let lastTranslatedLength = 0;
    
    recognition.onresult = (event) => {
      interimTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcript + ' ';
        } else {
          interimTranscript += transcript;
        }
      }
      
      renderLiveOriginal();
      
      // 새로 확정된 부분만 번역 큐에 추가
      const newFinalText = finalTranscript.substring(lastTranslatedLength).trim();
      if (newFinalText) {
        console.log('[새 확정 텍스트]', newFinalText);
        pendingOriginalForTranslation += (pendingOriginalForTranslation ? ' ' : '') + newFinalText;
        lastTranslatedLength = finalTranscript.length;
        
        // 디바운싱: 300ms 안에 새로운 확정 텍스트가 없으면 번역 실행
        if (translateDebounceTimer) clearTimeout(translateDebounceTimer);
        translateDebounceTimer = setTimeout(() => {
          console.log('[번역 트리거] 대기 중인 텍스트:', pendingOriginalForTranslation);
          processTranslationQueue();
        }, 300);
      }
    };
    
    recognition.onerror = (event) => {
      console.warn('음성 인식 오류:', event.error);
    };
    
    recognition.onend = () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { recognition.start(); } catch (e) {}
      }
    };
    
    try {
      recognition.start();
      liveTranscripts.classList.add('show');
    } catch (e) {
      console.warn('음성 인식 시작 실패:', e);
    }
  }
  
  function stopSpeechRecognition() {
    if (recognition) {
      recognition.onend = null;
      try { recognition.stop(); } catch (e) {}
      recognition = null;
    }
    
    // 남은 번역 처리
    if (translateDebounceTimer) clearTimeout(translateDebounceTimer);
    if (pendingOriginalForTranslation.trim()) {
      processTranslationQueue();
    }
  }
  
  async function startRecording() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') 
        ? 'audio/webm' : 'audio/mp4';
      
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      audioChunks = [];
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      
      mediaRecorder.onstop = async () => {
        const duration = (Date.now() - startTime) / 1000;
        const blob = new Blob(audioChunks, { type: mimeType });
        const url = URL.createObjectURL(blob);
        
        const transcript = (finalTranscript + interimTranscript).trim();
        const recLanguage = primaryLanguage;
        const transLanguage = recLanguage === 'ko-KR' ? 'en-US' : 'ko-KR';
        
        recordingCounter++;
        const newRecording = {
          id: Date.now(),
          name: `녹음 ${recordingCounter}`,
          url, blob, duration, mimeType,
          transcript,
          translation: liveTranslation_translatedText,
          language: recLanguage,
          translationLanguage: transLanguage,
          date: new Date(),
          showTranscript: !!transcript
        };
        recordings.push(newRecording);
        
        renderRecordings();
        
        // 마지막에 미확정 부분이 있으면 추가 번역
        const fullOriginal = transcript;
        const translatedSoFar = liveTranslation_finalText;
        const untranslatedPart = fullOriginal.substring(translatedSoFar.length).trim();
        
        if (untranslatedPart && transcript) {
          const additionalTranslation = await translateText(untranslatedPart, recLanguage, transLanguage);
          if (additionalTranslation) {
            newRecording.translation = (newRecording.translation ? newRecording.translation + ' ' : '') + additionalTranslation;
            renderRecordings();
          }
        }
        
        cleanup();
      };
      
      mediaRecorder.start();
      startTime = Date.now();
      
      startSpeechRecognition();
      
      recordBtn.classList.add('recording');
      status.textContent = '녹음 중...';
      timerInterval = setInterval(updateTimer, 100);
      visualize();
      
    } catch (err) {
      console.error(err);
      if (err.name === 'NotAllowedError') {
        showError('마이크 권한이 필요해요. 브라우저 설정에서 허용해주세요.');
      } else if (err.name === 'NotFoundError') {
        showError('마이크를 찾을 수 없어요.');
      } else {
        showError('녹음을 시작할 수 없어요: ' + err.message);
      }
    }
  }
  
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    stopSpeechRecognition();
  }
  
  function cleanup() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    
    recordBtn.classList.remove('recording');
    status.textContent = '탭하여 녹음 시작';
    timer.textContent = '00:00';
    resetWaveform();
    
    setTimeout(() => {
      liveTranscripts.classList.remove('show');
      finalTranscript = '';
      interimTranscript = '';
      liveTranslation_finalText = '';
      liveTranslation_translatedText = '';
      pendingOriginalForTranslation = '';
      renderLiveOriginal();
      renderLiveTranslation();
    }, 800);
  }
  
  function langLabel(lang) {
    return lang === 'ko-KR' ? '🇰🇷 한국어' : '🇺🇸 English';
  }
  
  function renderRecordings() {
    countEl.textContent = recordings.length;
    
    if (recordings.length === 0) {
      recordingsList.innerHTML = '<div class="empty-state">아직 녹음된 파일이 없어요</div>';
      return;
    }
    
    recordingsList.innerHTML = recordings.map(rec => {
      const originalClass = rec.language === 'ko-KR' ? 'korean' : 'english';
      const translationClass = rec.translationLanguage === 'ko-KR' ? 'korean' : 'english';
      
      return `
        <div class="recording-item" data-id="${rec.id}">
          <div class="recording-header">
            <div class="recording-info">
              <div class="recording-name">${rec.name}</div>
              <div class="recording-duration">${formatTime(rec.duration)} · ${langLabel(rec.language)}</div>
            </div>
            <div class="recording-actions">
              <button class="action-btn play" data-id="${rec.id}" title="재생">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <button class="action-btn text" data-id="${rec.id}" title="텍스트 보기">
                <svg viewBox="0 0 24 24"><path d="M14 17H4v2h10v-2zm6-8H4v2h16V9zM4 15h16v-2H4v2zM4 5v2h16V5H4z"/></svg>
              </button>
              <button class="action-btn download" data-id="${rec.id}" title="음성 다운로드">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
              </button>
              <button class="action-btn delete" data-id="${rec.id}" title="삭제">
                <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              </button>
            </div>
          </div>
          <div class="transcript-container ${rec.showTranscript ? 'show' : ''}" id="transcript-${rec.id}">
            <div class="transcript-box ${originalClass}">
              <div class="transcript-label">
                <span>${langLabel(rec.language)} (원문)</span>
                ${rec.transcript ? `
                  <span>
                    <button class="copy-btn" data-id="${rec.id}" data-action="copy-original">복사</button>
                  </span>
                ` : ''}
              </div>
              ${rec.transcript 
                ? `<div>${escapeHtml(rec.transcript)}</div>` 
                : '<div class="transcript-empty">변환된 텍스트가 없어요</div>'}
            </div>
            <div class="transcript-box ${translationClass}">
              <div class="transcript-label">
                <span>${langLabel(rec.translationLanguage)} (번역)</span>
                ${rec.translation ? `
                  <span>
                    <button class="copy-btn" data-id="${rec.id}" data-action="copy-translation">복사</button>
                    <button class="copy-btn" data-id="${rec.id}" data-action="download-text">.txt 저장</button>
                  </span>
                ` : ''}
              </div>
              ${rec.translation 
                ? `<div>${escapeHtml(rec.translation)}</div>` 
                : '<div class="transcript-empty">번역된 텍스트가 없어요</div>'}
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    recordingsList.querySelectorAll('.play').forEach(btn => {
      btn.addEventListener('click', () => playRecording(parseInt(btn.dataset.id)));
    });
    recordingsList.querySelectorAll('.text').forEach(btn => {
      btn.addEventListener('click', () => toggleTranscript(parseInt(btn.dataset.id)));
    });
    recordingsList.querySelectorAll('.download').forEach(btn => {
      btn.addEventListener('click', () => downloadRecording(parseInt(btn.dataset.id)));
    });
    recordingsList.querySelectorAll('.delete').forEach(btn => {
      btn.addEventListener('click', () => deleteRecording(parseInt(btn.dataset.id)));
    });
    recordingsList.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = parseInt(btn.dataset.id);
        const action = btn.dataset.action;
        if (action === 'copy-original') copyText(id, 'original', btn);
        else if (action === 'copy-translation') copyText(id, 'translation', btn);
        else if (action === 'download-text') downloadTranscript(id);
      });
    });
  }
  
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
  
  function playRecording(id) {
    const rec = recordings.find(r => r.id === id);
    if (!rec) return;
    document.querySelectorAll('audio').forEach(a => a.pause());
    const audio = new Audio(rec.url);
    audio.play();
  }
  
  function toggleTranscript(id) {
    const rec = recordings.find(r => r.id === id);
    if (!rec) return;
    rec.showTranscript = !rec.showTranscript;
    const box = document.getElementById(`transcript-${id}`);
    if (box) box.classList.toggle('show');
  }
  
  function copyText(id, type, btn) {
    const rec = recordings.find(r => r.id === id);
    if (!rec) return;
    const text = type === 'original' ? rec.transcript : rec.translation;
    if (!text) return;
    
    const showCopied = () => {
      const originalText = btn.textContent;
      btn.textContent = '✓ 복사됨';
      setTimeout(() => { btn.textContent = originalText; }, 1500);
    };
    
    navigator.clipboard.writeText(text).then(showCopied).catch(() => {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showCopied();
    });
  }
  
  function downloadTranscript(id) {
    const rec = recordings.find(r => r.id === id);
    if (!rec) return;
    
    let content = '';
    if (rec.transcript) {
      content += `[${langLabel(rec.language)} - 원문]\n${rec.transcript}\n\n`;
    }
    if (rec.translation) {
      content += `[${langLabel(rec.translationLanguage)} - 번역]\n${rec.translation}\n`;
    }
    if (!content) return;
    
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${rec.name}.txt`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 100);
  }
  
  function downloadRecording(id) {
    const rec = recordings.find(r => r.id === id);
    if (!rec) return;
    const ext = rec.mimeType.includes('webm') ? 'webm' : 'm4a';
    const a = document.createElement('a');
    a.href = rec.url;
    a.download = `${rec.name}.${ext}`;
    a.click();
  }
  
  function deleteRecording(id) {
    const rec = recordings.find(r => r.id === id);
    if (rec) URL.revokeObjectURL(rec.url);
    recordings = recordings.filter(r => r.id !== id);
    renderRecordings();
  }
  
  recordBtn.addEventListener('click', () => {
    if (recordBtn.classList.contains('recording')) {
      stopRecording();
    } else {
      startRecording();
    }
  });
</script>
</body>
